<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kreds</title>
<style>
  :root{
    --bg:#FFFFFF;
    --bg2:#FFFFFF;
    --ink:#0F1419;
    --gray:#536471;
    --line:#EFF3F4;
    --line2:#CFD9DE;
    --chip:#F7F9F9;
    --red:#E0402F;
    --red-dark:#C4351F;
    --scrim:rgba(0,0,0,.4);
    --toastbg:rgba(15,20,25,.82);
    --toastink:#fff;
    --glass:rgba(255,255,255,.58);
    --glass-strong:rgba(255,255,255,.78);
    --glass-edge:rgba(255,255,255,.65);
    --glass-hi:rgba(255,255,255,.6);
    --glass-shadow:0 12px 34px rgba(15,20,25,.16);
    --seg:rgba(15,20,25,.07);
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#15202B;
      --bg2:#1E2732;
      --ink:#F7F9F9;
      --gray:#8B98A5;
      --line:#2F3B45;
      --line2:#3E4C56;
      --chip:#1E2732;
      --scrim:rgba(91,112,131,.4);
      --toastbg:rgba(58,68,76,.85);
      --toastink:#fff;
      --glass:rgba(23,32,43,.55);
      --glass-strong:rgba(30,39,50,.80);
      --glass-edge:rgba(255,255,255,.14);
      --glass-hi:rgba(255,255,255,.16);
      --glass-shadow:0 14px 36px rgba(0,0,0,.55);
      --seg:rgba(255,255,255,.10);
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:#0A0A0A;
    min-height:100dvh;
    display:flex;justify-content:center;align-items:center;
  }
  button{font:inherit;cursor:pointer;background:none;border:none;color:inherit;-webkit-tap-highlight-color:transparent}
  input,textarea{font:inherit;color:inherit}
  img{-webkit-user-drag:none}
  :focus-visible{outline:2px solid var(--red);outline-offset:2px;border-radius:4px}

  .stroke{fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .fillic{fill:currentColor;stroke:none}

  /* ================= Telefon ================= */
  .phone{
    position:relative;
    width:100%;max-width:430px;
    height:100dvh;
    overflow:hidden;
    background:var(--bg);
  }
  @media(min-width:500px){
    body{padding:24px}
    .phone{
      height:min(932px,94vh);
      border-radius:54px;
      border:11px solid #0B0B0B;
      box-shadow:0 0 0 2px #2a2a2a,0 50px 100px rgba(0,0,0,.65);
    }
  }
  .island{display:none}
  @media(min-width:500px){
    .island{
      display:block;
      position:absolute;top:11px;left:50%;transform:translateX(-50%);
      width:122px;height:34px;border-radius:20px;background:#0B0B0B;z-index:130;
    }
  }
  .app{height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg)}

  /* ================= Statusbar (kun i ramme) ================= */
  .statusbar{
    display:none;
    position:sticky;top:0;z-index:60;
    height:52px;
    background:var(--glass);
    -webkit-backdrop-filter:blur(22px) saturate(1.8);
    backdrop-filter:blur(22px) saturate(1.8);
    align-items:center;justify-content:space-between;
    padding:14px 30px 0;
    font-size:15px;font-weight:600;
    color:var(--ink);
  }
  @media(min-width:500px){.statusbar{display:flex}}
  .statusbar .sicons{display:flex;align-items:center;gap:6px}
  .statusbar svg{display:block}

  /* ================= Topbar ================= */
  .topbar{
    position:sticky;top:0;z-index:50;
    display:flex;align-items:center;justify-content:space-between;
    height:52px;
    padding:0 16px;
    background:var(--glass);
    -webkit-backdrop-filter:blur(22px) saturate(1.8);
    backdrop-filter:blur(22px) saturate(1.8);
    border-bottom:1px solid var(--glass-edge);
    box-shadow:inset 0 1px 0 var(--glass-hi);
  }
  @media(min-width:500px){.topbar{top:52px}}
  .wordmark{
    font-family:Georgia,"Times New Roman",serif;
    font-weight:700;font-size:27px;letter-spacing:-.5px;
    color:var(--ink);
  }
  .wordmark .prik{color:var(--red)}
  .nosparkle{padding:6px 2px;color:var(--ink)}
  .nosparkle svg{width:23px;height:23px;display:block}

  /* ================= Stories ================= */
  .stories{
    display:flex;gap:14px;
    padding:12px 14px;
    overflow-x:auto;
    scrollbar-width:none;
    border-bottom:1px solid var(--line);
  }
  .stories::-webkit-scrollbar{display:none}
  .story{flex:0 0 auto;width:68px;text-align:center}
  .story .ring{
    width:62px;height:62px;margin:0 auto;border-radius:50%;
    padding:2.5px;
    background:linear-gradient(45deg,#FF9A3E,#E0402F,#B8288F);
  }
  .story .ring.seen{background:var(--line2)}
  .story .ring.none{background:var(--line)}
  .story .ava{
    width:100%;height:100%;border-radius:50%;
    border:2.5px solid var(--bg);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:19px;
  }
  .story .lbl{
    margin-top:5px;font-size:11px;color:var(--ink);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .story .ringwrap{position:relative;width:62px;margin:0 auto}
  .story .plusb{
    position:absolute;right:-1px;bottom:-1px;
    width:21px;height:21px;border-radius:50%;
    background:var(--red);color:#fff;
    border:2.5px solid var(--bg);
    display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;line-height:1;
  }

  /* ================= Kreds-vælger ================= */
  .feedbar{
    position:sticky;top:52px;z-index:45;
    display:flex;gap:8px;align-items:center;
    padding:9px 12px;
    overflow-x:auto;scrollbar-width:none;
    background:var(--glass);
    -webkit-backdrop-filter:blur(22px) saturate(1.8);
    backdrop-filter:blur(22px) saturate(1.8);
    border-bottom:1px solid var(--glass-edge);
  }
  @media(min-width:500px){.feedbar{top:104px}}
  .feedbar::-webkit-scrollbar{display:none}
  .fpill{
    flex:0 0 auto;
    border-radius:999px;
    padding:7px 15px;
    font-size:13.5px;font-weight:700;
    background:var(--glass-strong);
    border:1px solid var(--glass-edge);
    box-shadow:inset 0 1px 0 var(--glass-hi);
    color:var(--ink);
    transition:transform .18s cubic-bezier(.34,1.56,.64,1);
    white-space:nowrap;
  }
  .fpill:active{transform:scale(.92)}
  .fpill.on{background:var(--red);border-color:var(--red);color:#fff}
  .fpill.new{color:var(--red)}

  .kredshead{
    display:flex;align-items:center;gap:11px;
    padding:12px 16px;
    border-bottom:1px solid var(--line);
  }
  .mstack{display:flex}
  .mav{
    width:30px;height:30px;border-radius:50%;
    border:2px solid var(--bg);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:11px;
  }
  .mav+.mav{margin-left:-9px}
  .kredshead .ktxt{font-size:13px;color:var(--gray);line-height:1.35}
  .kredshead .ktxt b{color:var(--ink);font-weight:700;font-size:13.5px}

  /* ================= Views ================= */
  .view{display:none}
  .view.active{display:block}

  /* ================= Timeline-post (X-anatomi) ================= */
  .post{
    display:flex;gap:11px;
    padding:12px 16px 8px;
    border-bottom:1px solid var(--line);
  }
  .pava{
    width:42px;height:42px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:16px;
    flex:0 0 auto;
  }
  .pring{
    width:48px;height:48px;flex:0 0 auto;
    border-radius:50%;padding:2px;
    background:linear-gradient(45deg,#FF9A3E,#E0402F,#B8288F);
  }
  .pring.seen{background:var(--line2)}
  .pring.none{background:transparent;padding:0;width:42px;height:42px}
  .pring .pava{width:100%;height:100%;border:2px solid var(--bg)}
  .pring.none .pava{border:none}

  .pcol{flex:1;min-width:0}
  .hline{display:flex;align-items:center;gap:4px;min-width:0}
  .hline .nm{font-weight:700;font-size:15px;color:var(--ink);white-space:nowrap}
  .hline .badge{flex:0 0 auto;display:flex}
  .hline .badge svg{width:15px;height:15px}
  .hline .sub{
    color:var(--gray);font-size:14px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    min-width:0;
  }
  .hline .dots{margin-left:auto;color:var(--gray);padding:2px 0 2px 8px;flex:0 0 auto}
  .hline .dots svg{width:19px;height:19px}

  .ptext{margin-top:2px;font-size:15px;color:var(--ink);white-space:pre-wrap;overflow-wrap:break-word}
  .ptext.big{font-size:20px;line-height:1.35}

  .pmedia{
    position:relative;
    margin-top:10px;
    border-radius:16px;
    overflow:hidden;
    border:1px solid var(--line);
    background:var(--chip);
  }
  .pmedia img{display:block;width:100%;max-height:430px;object-fit:cover}

  .bigheart{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    pointer-events:none;
  }
  .bigheart svg{
    width:88px;height:88px;fill:#fff;stroke:none;
    filter:drop-shadow(0 4px 14px rgba(0,0,0,.35));
    opacity:0;
  }
  .bigheart.go svg{animation:bigpop .9s cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes bigpop{
    0%{opacity:0;transform:scale(.35)}
    18%{opacity:.95;transform:scale(1.12)}
    45%{opacity:.95;transform:scale(1)}
    78%{opacity:.95;transform:scale(1)}
    100%{opacity:0;transform:scale(.9) translateY(-10px)}
  }

  .pactions{
    display:flex;align-items:center;justify-content:space-between;
    max-width:270px;
    margin-top:8px;
    color:var(--gray);
  }
  .pactions button{display:flex;align-items:center;gap:6px;color:var(--gray);padding:4px 0;font-size:13px}
  .pactions svg{width:19px;height:19px}
  .pactions button:active{opacity:.6}
  .like-btn.on{color:var(--red)}
  .like-btn.on svg path{fill:var(--red);stroke:var(--red)}
  .like-btn.on svg{animation:pop .3s ease}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.25)}100%{transform:scale(1)}}

  /* ---------- Du er helt opdateret ---------- */
  .caughtup{
    text-align:center;
    padding:36px 20px 110px;
  }
  .caughtup .ring{
    width:80px;height:80px;border-radius:50%;
    margin:0 auto 14px;
    padding:3px;
    background:linear-gradient(45deg,#FF9A3E,#E0402F,#B8288F);
  }
  .caughtup .inner{
    width:100%;height:100%;border-radius:50%;
    background:var(--bg);
    display:flex;align-items:center;justify-content:center;
  }
  .caughtup .inner svg{width:36px;height:36px;stroke:var(--ink);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .caughtup h3{font-size:15px;font-weight:700;color:var(--ink)}
  .caughtup p{font-size:13.5px;color:var(--gray);margin-top:4px}

  /* ================= Søg ================= */
  .searchhead{
    padding:10px 16px 8px;position:sticky;top:52px;z-index:40;
    background:var(--glass);
    -webkit-backdrop-filter:blur(22px) saturate(1.8);
    backdrop-filter:blur(22px) saturate(1.8);
    border-bottom:1px solid var(--glass-edge);
  }
  @media(min-width:500px){.searchhead{top:104px}}
  .searchbox{
    display:flex;align-items:center;gap:9px;
    background:var(--glass-strong);
    border:1px solid var(--glass-edge);
    box-shadow:inset 0 1px 0 var(--glass-hi);
    border-radius:999px;
    padding:10px 15px;
  }
  .searchbox svg{width:17px;height:17px;color:var(--gray);flex:0 0 auto}
  .searchbox input{flex:1;min-width:0;border:none;background:transparent;font-size:15px}
  .searchbox input:focus{outline:none}
  .listrow{display:flex;align-items:center;gap:12px;padding:11px 16px}
  .ava44{
    width:44px;height:44px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:16px;flex:0 0 auto;
  }
  .listrow .grow{flex:1;min-width:0;line-height:1.3}
  .listrow .l1{font-weight:700;font-size:14.5px;color:var(--ink);display:flex;align-items:center;gap:4px}
  .listrow .l1 svg{width:14px;height:14px}
  .listrow .l2{font-size:13.5px;color:var(--gray)}
  .sectionlabel{font-size:17px;font-weight:800;padding:14px 16px 6px;color:var(--ink)}
  .addaction{color:var(--red);font-weight:700;font-size:14px;text-align:left}
  .emptynote{padding:18px 16px;color:var(--gray);font-size:14px}

  /* ================= Notifikationer ================= */
  .pagetitle{font-size:19px;font-weight:800;color:var(--ink);padding:12px 16px 8px;border-bottom:1px solid var(--line)}
  .notif{
    display:flex;gap:12px;
    padding:12px 16px;
    border-bottom:1px solid var(--line);
  }
  .notif .nicon{width:26px;flex:0 0 auto;display:flex;justify-content:center;padding-top:2px}
  .notif .nicon svg{width:22px;height:22px}
  .notif .nicon.heart{color:var(--red)}
  .notif .nicon.heart svg path{fill:var(--red);stroke:var(--red)}
  .notif .nicon.bubble{color:#7856FF}
  .notif .nicon.friend{color:var(--red)}
  .notif .grow{flex:1;min-width:0}
  .notif .ava28{
    width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:11px;
    margin-bottom:7px;
  }
  .notif .ntext{font-size:14.5px;color:var(--ink)}
  .notif .ntext b{font-weight:700}
  .notif .nsnip{font-size:14px;color:var(--gray);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .notif .nt{color:var(--gray);font-size:13px;flex:0 0 auto}

  /* ================= Profil ================= */
  .banner{height:110px;background:linear-gradient(60deg,#E0402F,#FF7A45,#B8288F)}
  .prow{display:flex;align-items:flex-end;justify-content:space-between;padding:0 16px;margin-top:-40px}
  .ava80{
    width:82px;height:82px;border-radius:50%;
    border:4px solid var(--bg);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:30px;
  }
  .editbtn{
    background:var(--glass-strong);
    -webkit-backdrop-filter:blur(16px) saturate(1.7);
    backdrop-filter:blur(16px) saturate(1.7);
    border:1px solid var(--glass-edge);
    box-shadow:inset 0 1px 0 var(--glass-hi);
    border-radius:999px;
    padding:7px 16px;
    font-weight:700;font-size:14px;
    color:var(--ink);
    margin-bottom:6px;
  }
  .pname{padding:10px 16px 0}
  .pname .n{font-size:20px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:5px}
  .pname .n svg{width:17px;height:17px}
  .pname .h{font-size:14.5px;color:var(--gray)}
  .pbio{padding:10px 16px 4px;font-size:15px;color:var(--ink)}
  .pmeta{padding:6px 16px 12px;font-size:14.5px;color:var(--gray);border-bottom:1px solid var(--line)}
  .pmeta b{color:var(--ink);font-weight:700}
  .ptl{font-size:15px;font-weight:800;padding:12px 16px;border-bottom:1px solid var(--line);color:var(--ink)}

  /* ================= Tabbar ================= */
  .tabbar{
    position:sticky;bottom:14px;z-index:50;
    display:flex;align-items:center;justify-content:space-around;
    height:62px;
    margin:12px 16px calc(14px + env(safe-area-inset-bottom));
    border-radius:34px;
    background:var(--glass);
    -webkit-backdrop-filter:blur(24px) saturate(1.9);
    backdrop-filter:blur(24px) saturate(1.9);
    border:1px solid var(--glass-edge);
    box-shadow:var(--glass-shadow),inset 0 1px 0 var(--glass-hi);
    padding:0 6px;
  }
  .tabbar button{
    display:flex;align-items:center;justify-content:center;
    width:56px;height:44px;border-radius:22px;
    color:var(--ink);
    transition:transform .18s cubic-bezier(.34,1.56,.64,1),background .18s ease;
  }
  .tabbar button:active{transform:scale(.86)}
  .tabbar button.active{background:var(--seg)}
  .tabbar svg{width:25px;height:25px}

  /* ================= FAB ================= */
  .fab{
    position:absolute;right:20px;bottom:calc(102px + env(safe-area-inset-bottom));z-index:55;
    width:58px;height:58px;border-radius:50%;
    background:linear-gradient(160deg,#FF6A4D,var(--red));
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    border:1px solid rgba(255,255,255,.45);
    box-shadow:0 14px 30px rgba(224,64,47,.45),0 3px 8px rgba(0,0,0,.22),inset 0 1.5px 0 rgba(255,255,255,.55);
    transition:transform .18s cubic-bezier(.34,1.56,.64,1);
  }
  .fab svg{width:25px;height:25px;stroke-width:2.2}
  .fab:active{transform:scale(.94)}

  /* ================= Overlays ================= */
  .scrim{
    position:absolute;inset:0;z-index:80;
    background:var(--scrim);
    -webkit-backdrop-filter:blur(3px);
    backdrop-filter:blur(3px);
    opacity:0;pointer-events:none;
    transition:opacity .2s ease;
  }
  .scrim.on{opacity:1;pointer-events:auto}

  /* ---- Kommentarer ---- */
  .cmtsheet{
    position:absolute;left:0;right:0;bottom:0;z-index:85;
    height:74%;
    background:var(--glass-strong);
    -webkit-backdrop-filter:blur(28px) saturate(1.9);
    backdrop-filter:blur(28px) saturate(1.9);
    border:1px solid var(--glass-edge);
    border-bottom:none;
    border-radius:22px 22px 0 0;
    transform:translateY(105%);
    transition:transform .28s cubic-bezier(.32,.72,.25,1);
    display:flex;flex-direction:column;
    box-shadow:0 -10px 40px rgba(0,0,0,.2),inset 0 1px 0 var(--glass-hi);
  }
  .cmtsheet.on{transform:translateY(0)}
  .cmt-grab{width:38px;height:4px;border-radius:2px;background:var(--line2);margin:8px auto 6px}
  .cmt-title{
    text-align:center;font-weight:800;font-size:15px;color:var(--ink);
    padding-bottom:10px;border-bottom:1px solid var(--line);
  }
  .cmt-list{flex:1;overflow-y:auto;padding:4px 0}
  .cmt-row{display:flex;gap:11px;padding:11px 16px;align-items:flex-start}
  .ava34{
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:13px;flex:0 0 auto;
  }
  .cmt-row .body{flex:1;min-width:0;font-size:14px;line-height:1.4;color:var(--ink)}
  .cmt-row .body b{font-weight:700}
  .cmt-row .body .t{color:var(--gray);font-weight:400;font-size:13px;margin-left:5px}
  .cmt-row .body .txt{margin-top:1px}
  .cmt-row .likec{padding:6px 2px;color:var(--gray)}
  .cmt-row .likec svg{width:14px;height:14px}
  .cmt-row .likec.on{color:var(--red)}
  .cmt-row .likec.on svg path{fill:var(--red);stroke:var(--red)}
  .cmt-cap{border-bottom:1px solid var(--line);margin-bottom:2px}
  .cmt-input{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px calc(12px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);
  }
  .cmt-input input{flex:1;min-width:0;border:none;font-size:14.5px;background:transparent}
  .cmt-input input:focus{outline:none}
  .cmt-post{color:var(--red);font-weight:800;font-size:14px}
  .cmt-post:disabled{opacity:.35;cursor:default}

  /* ---- Ny kreds ---- */
  .fsheet{
    position:absolute;left:0;right:0;bottom:0;z-index:86;
    max-height:80%;
    background:var(--glass-strong);
    -webkit-backdrop-filter:blur(28px) saturate(1.9);
    backdrop-filter:blur(28px) saturate(1.9);
    border:1px solid var(--glass-edge);border-bottom:none;
    border-radius:22px 22px 0 0;
    transform:translateY(105%);
    transition:transform .28s cubic-bezier(.32,.72,.25,1);
    display:flex;flex-direction:column;
    box-shadow:0 -10px 40px rgba(0,0,0,.2),inset 0 1px 0 var(--glass-hi);
  }
  .fsheet.on{transform:translateY(0)}
  .fs-name{
    margin:8px 16px 2px;
    display:flex;align-items:center;
    background:var(--glass);
    border:1px solid var(--glass-edge);
    border-radius:14px;
    padding:12px 14px;
  }
  .fs-name input{flex:1;min-width:0;border:none;background:transparent;font-size:16px;font-weight:600}

    var p=e.target.closest(".fpill");
    if(!p) return;
    if(p.dataset.feed==="__new"){ openFeedSheet(); return; }
    setFeed(p.dataset.feed);
  });

  var fsSelected={};
  function openFeedSheet(){
    fsSelected={};
    el("fs-name").value="";
    renderFsList(); fsCan();
    el("scrim").classList.add("on");
    el("fsheet").classList.add("on");
    setTimeout(function(){ el("fs-name").focus(); },260);
  }
  function closeFeedSheet(){
    el("fsheet").classList.remove("on");
    el("scrim").classList.remove("on");
  }
  function renderFsList(){
    el("fs-list").innerHTML=state.friends.map(function(h){
      return '<div class="listrow'+(fsSelected[h]?" sel":"")+'" data-h="'+esc(h)+'">'+
        '<div class="ava44" style="background:'+grad(h)+'">'+ini(h)+'</div>'+
        '<div class="grow"><div class="l1">'+esc(user(h).name)+'</div><div class="l2">@'+esc(h)+'</div></div>'+
        '<span class="mcheck"><svg viewBox="0 0 24 24"><path d="M20 6 9.5 16.5 4 11"/></svg></span>'+
      '</div>';
    }).join("");
  }
  function fsCan(){
    var any=Object.keys(fsSelected).some(function(k){ return fsSelected[k]; });
    el("fs-create").disabled=!(el("fs-name").value.trim() && any);
  }
  el("fs-list").addEventListener("click",function(e){
    var r=e.target.closest(".listrow");
    if(!r) return;
    fsSelected[r.dataset.h]=!fsSelected[r.dataset.h];
    r.classList.toggle("sel",!!fsSelected[r.dataset.h]);
    fsCan();
  });
  el("fs-name").addEventListener("input",fsCan);
  el("fs-create").addEventListener("click",function(){
    var name=el("fs-name").value.trim();
    var members=["dk"].concat(state.friends.filter(function(h){ return fsSelected[h]; }));
    if(!name||members.length<2) return;
    var f={id:"f"+Date.now(), name:name, members:members};
    state.feeds.push(f);
    closeFeedSheet();
    setFeed(f.id);
    renderComposeDest();
    toast("Kredsen \u201D"+name+"\u201D er oprettet");
  });
  function renderMyPosts(){
    var mine=state.posts.filter(function(p){ return p.u==="dk"; });
    el("stat-posts").textContent=mine.length;
    el("stat-friends").textContent=state.friends.length;
    el("myposts").innerHTML = mine.length
      ? mine.map(postHTML).join("")
      : '<div class="emptynote">Du har ikke delt noget endnu. Tryk på + og del et billede eller en tanke.</div>';
  }

  /* ================= Søg ================= */
  function renderSearch(){
    var q=(el("search-input").value||"").trim().toLowerCase();
    var list=state.friends.filter(function(h){
      return !q || h.toLowerCase().indexOf(q)>=0 || user(h).name.toLowerCase().indexOf(q)>=0;
    });
    var html=list.map(function(h){
      return '<div class="listrow">'+
               '<div class="ava44" style="background:'+grad(h)+'">'+ini(h)+'</div>'+
               '<div class="grow"><div class="l1">'+esc(user(h).name)+' '+BADGE+'</div><div class="l2">@'+esc(h)+'</div></div>'+
             '</div>';
    }).join("");
    if(q && !state.friends.some(function(h){ return h.toLowerCase()===q; })){
      html += '<div class="listrow">'+
                '<div class="ava44" style="background:var(--line2);color:var(--gray)">+</div>'+
                '<div class="grow"><button class="addaction" data-add="'+esc(q)+'">Tilføj \u201D'+esc(q)+'\u201D til din kreds</button></div>'+
              '</div>';
    }
    if(!html) html='<div class="emptynote">Ingen i din kreds matcher.</div>';
    el("search-list").innerHTML=html;
  }

  /* ================= Notifikationer ================= */
  function renderNotifs(){
    var H='<svg viewBox="0 0 24 24"><path class="stroke" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
    var B='<svg viewBox="0 0 24 24"><path class="stroke" d="M12 3.3a8.7 8.7 0 0 0-7.4 13.2L3.4 20.6l4.2-1.1A8.7 8.7 0 1 0 12 3.3Z"/></svg>';
    var P='<svg viewBox="0 0 24 24"><g class="stroke"><circle cx="10" cy="8" r="3.4"/><path d="M3.8 19.5c.7-3.3 3.2-5 6.2-5s5.5 1.7 6.2 5"/><path d="M18.5 6.5v6M15.5 9.5h6"/></g></svg>';
    function row(icon, cls, u, text, snip, t){
      return '<div class="notif">'+
        '<div class="nicon '+cls+'">'+icon+'</div>'+
        '<div class="grow">'+
          '<div class="ava28" style="background:'+grad(u)+'">'+ini(u)+'</div>'+
          '<div class="ntext"><b>'+esc(user(u).name)+'</b> '+text+'</div>'+
          (snip?'<div class="nsnip">'+esc(snip)+'</div>':'')+
        '</div>'+
        '<span class="nt">'+t+'</span>'+
      '</div>';
    }
    var my=findPost(4);
    el("notifs").innerHTML =
      row(H,"heart","sofie.kragh","nikkede til dit opslag", my?my.text:"", "8t")+
      row(B,"bubble","clara.winther","skrev i Mols-turen 🚗","Jeg tager snacks og kaffe til turen ☕","1t")+
      row(B,"bubble","mikkel_toft","svarede på dit opslag","Endelig et sted uden reels.","7t")+
      row(H,"heart","clara.winther","nikkede til dit opslag", my?my.text:"", "9t")+
      row(P,"friend","jonaslund","er nu i din kreds","","1d");
  }

  /* ================= Tabs ================= */
  function switchTab(name){
    document.querySelectorAll(".view").forEach(function(v){ v.classList.remove("active"); });
    el("view-"+name).classList.add("active");
    document.querySelectorAll(".tabbar [data-view]").forEach(function(b){
      b.classList.toggle("active", b.dataset.view===name);
    });
    setTabIcons(name);
    if(name==="search") renderSearch();
    if(name==="akt") renderNotifs();
    if(name==="profil") renderMyPosts();
    el("fab").style.display = (name==="akt") ? "none" : "flex";
    el("app").scrollTop=0;
  }
  document.querySelectorAll(".tabbar [data-view]").forEach(function(t){
    t.addEventListener("click", function(){ switchTab(t.dataset.view); });
  });
  el("nosparkle").addEventListener("click",function(){
    toast("Ingen algoritme her. Feedet er altid kronologisk.");
  });

  /* ================= Like / svar ================= */
  function setLike(id, on){
    var p=findPost(id);
    if(!p) return;
    p.liked = (on===undefined) ? !p.liked : on;
    document.querySelectorAll('.post[data-id="'+id+'"]').forEach(function(node){
      var btn=node.querySelector(".like-btn");
      btn.classList.toggle("on",p.liked);
      btn.setAttribute("aria-pressed",p.liked);
    });
  }

  var openPostId=null;
  function openComments(id){
    openPostId=Number(id);
    renderComments();
    el("scrim").classList.add("on");
    el("cmtsheet").classList.add("on");
  }
  function closeComments(){
    el("scrim").classList.remove("on");
    el("cmtsheet").classList.remove("on");
    openPostId=null;
    el("cmt-field").value="";
    el("cmt-send").disabled=true;
  }
  function cmtRow(u,text,t,liked,idx){
    return '<div class="cmt-row">'+
      '<div class="ava34" style="background:'+grad(u)+'">'+ini(u)+'</div>'+
      '<div class="body"><b>'+esc(user(u).name)+'</b><span class="t">@'+esc(u)+' · '+esc(t)+'</span>'+
      '<div class="txt">'+esc(text)+'</div></div>'+
      (idx>=0?'<button class="likec'+(liked?" on":"")+'" data-ci="'+idx+'" aria-label="Nik">'+
        '<svg viewBox="0 0 24 24"><path class="stroke" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>':'')+
      '</div>';
  }
  function renderComments(){
    var p=findPost(openPostId);
    if(!p) return;
    var html='<div class="cmt-cap">'+cmtRow(p.u,p.text||"(billede)",p.t,false,-1)+'</div>';
    if(p.cmts.length){
      html+=p.cmts.map(function(c,i){ return cmtRow(c.u,c.text,c.t,c.liked,i); }).join("");
    } else {
      html+='<div class="emptynote">Ingen svar endnu. Start samtalen.</div>';
    }
    el("cmt-list").innerHTML=html;
  }
  el("cmt-list").addEventListener("click",function(e){
    var b=e.target.closest(".likec");
    if(!b) return;
    var p=findPost(openPostId);
    var c=p.cmts[Number(b.dataset.ci)];
    c.liked=!c.liked;
    b.classList.toggle("on",c.liked);
  });
  el("cmt-field").addEventListener("input",function(){
    el("cmt-send").disabled=this.value.trim().length===0;
  });
  function postComment(){
    var f=el("cmt-field");
    var text=f.value.trim();
    if(!text||openPostId==null) return;
    var p=findPost(openPostId);
    p.cmts.push({u:"dk",text:text,t:"nu",liked:false});
    f.value=""; el("cmt-send").disabled=true;
    renderComments(); renderFeed(); refreshPv();
    el("cmt-list").scrollTop=el("cmt-list").scrollHeight;
  }
  el("cmt-send").addEventListener("click",postComment);
  el("cmt-field").addEventListener("keydown",function(e){ if(e.key==="Enter") postComment(); });
  el("scrim").addEventListener("click",function(){ closeComments(); closeFeedSheet(); });

  /* ---- Klik i timeline ---- */
  var lastTap={id:null,t:0};
  function timelineClick(e){
    var like=e.target.closest(".like-btn");
    if(like){ setLike(like.dataset.id); return; }
    var cmt=e.target.closest(".cmt-btn");
    if(cmt){ openComments(cmt.dataset.id); return; }
    var sh=e.target.closest(".share-btn");
    if(sh){ toast("Bliver i kredsen — ingen deling udenfor"); return; }
    var d=e.target.closest(".dots");
    if(d){ toast("Intet skjult her — feedet er altid kronologisk"); return; }
    var pr=e.target.closest(".pring");
    if(pr && pr.dataset.storyof){
      if(pr.dataset.storyof==="dk"){ closeProfile(); switchTab("profil"); }
      else openProfile(pr.dataset.storyof);
      return;
    }
    var media=e.target.closest(".pmedia");
    if(media){
      var id=media.dataset.id;
      var now=Date.now();
      if(lastTap.id===id && now-lastTap.t<320){
        setLike(id,true);
        var bh=media.querySelector(".bigheart");
        bh.classList.remove("go");
        void bh.offsetWidth;
        bh.classList.add("go");
        lastTap={id:null,t:0};
      } else {
        lastTap={id:id,t:now};
      }
    }
  }
  el("feed").addEventListener("click",timelineClick);
  el("myposts").addEventListener("click",timelineClick);

  /* ================= Ven-profil ================= */
  var profileU=null;
  function openProfile(h){
    profileU=h;
    var theirs=state.posts.filter(function(p){ return p.u===h && !p.feed; });
    el("pv-name").textContent=user(h).name;
    el("pv-name2").textContent=user(h).name;
    el("pv-count").textContent=theirs.length+" opslag";
    el("pv-handle").textContent="@"+h;
    var g=user(h).g;
    el("pv-banner").style.background="linear-gradient(60deg,"+g[0]+","+g[1]+")";
    el("pv-ava").style.background=grad(h);
    el("pv-ava").textContent=ini(h);
    var st=hasStory(h);
    el("pv-story").style.display=st?"flex":"none";
    el("pv-ava-ring").classList.toggle("seen", !st || !!state.seen[h]);
    el("pv-since").textContent="I din kreds siden "+(user(h).since||"i dag")+" · Gensidig ven";
    el("pv-posts").innerHTML = theirs.length
      ? theirs.map(postHTML).join("")
      : '<div class="emptynote">Ingen opslag endnu.</div>';
    el("pv-body").scrollTop=0;
    el("profileview").classList.add("on");
  }
  function closeProfile(){
    el("profileview").classList.remove("on");
  }
  function refreshPv(){
    if(profileU && el("profileview").classList.contains("on")){
      var theirs=state.posts.filter(function(p){ return p.u===profileU && !p.feed; });
      el("pv-count").textContent=theirs.length+" opslag";
      el("pv-posts").innerHTML = theirs.map(postHTML).join("");
      el("pv-ava-ring").classList.toggle("seen", !hasStory(profileU) || !!state.seen[profileU]);
    }
  }
  el("pv-back").addEventListener("click",closeProfile);
  el("pv-story").addEventListener("click",function(){ if(profileU) openStory(profileU); });
  el("pv-ava-ring").addEventListener("click",function(){ if(profileU) openStory(profileU); });
  el("pv-posts").addEventListener("click",timelineClick);

  /* ================= Historier ================= */
  var story={list:[],idx:0,u:null,timer:null};

  function openStory(h){
    var items=state.posts.filter(function(p){ return p.u===h && !p.feed; }).slice(0,4).reverse();
    if(!items.length){ toast("Ingen historier endnu"); return; }
    story={list:items,idx:0,u:h,timer:null};
    state.seen[h]=true;
    el("story-ava").style.background=grad(h);
    el("story-ava").textContent=ini(h);
    el("story-name").textContent=user(h).name;
    el("storyview").classList.add("on");
    renderStorySlide();
  }
  function closeStory(){
    clearTimeout(story.timer);
    el("storyview").classList.remove("on");
    renderStories(); renderFeed(); refreshPv();
  }
  function renderStorySlide(){
    clearTimeout(story.timer);
    var it=story.list[story.idx];
    el("story-time").textContent=it.ts||"";
    var m=el("story-media");
    if(it.img){
      m.innerHTML='<img src="'+it.img.src+'" alt="'+esc(it.img.alt||"")+'">';
    } else {
      m.innerHTML='<div class="story-textslide" style="background:'+tgrad(it.id)+'"><span>'+esc(it.text)+'</span></div>';
    }
    el("story-heart").classList.toggle("on",!!it.liked);

    var bars='';
    for(var i=0;i<story.list.length;i++) bars+='<div class="bar"><i></i></div>';
    el("story-bars").innerHTML=bars;
    var fills=el("story-bars").querySelectorAll("i");
    fills.forEach(function(f,i){ f.style.width = i<story.idx ? "100%" : "0"; });
    var active=fills[story.idx];
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        active.style.transition="width 5s linear";
        active.style.width="100%";
      });
    });
    story.timer=setTimeout(nextStory,5000);
  }
  function nextStory(){
    if(story.idx<story.list.length-1){ story.idx++; renderStorySlide(); }
    else closeStory();
  }
  function prevStory(){
    if(story.idx>0){ story.idx--; }
    renderStorySlide();
  }
  el("tap-r").addEventListener("click",nextStory);
  el("tap-l").addEventListener("click",prevStory);
  el("story-close").addEventListener("click",closeStory);
  el("story-heart").addEventListener("click",function(){
    var it=story.list[story.idx];
    it.liked=!it.liked;
    this.classList.toggle("on",it.liked);
    setLike(it.id,it.liked);
  });
  el("stories").addEventListener("click",function(e){
    var s=e.target.closest(".story");
    if(!s) return;
    if(s.dataset.me){ openCompose(); return; }
    openProfile(s.dataset.u);
  });

  /* ================= Skriv ================= */
  var pendingImg=null;
  var ta=el("compose-field");
  var MAXC=280, CIRC=56.55;

  function updateRing(){
    var len=ta.value.length;
    var off=CIRC*(1-len/MAXC);
    el("charprog").style.strokeDashoffset=Math.max(0,off);
    var left=MAXC-len;
    var ring=el("charring");
    if(left<=20){
      ring.classList.add("warn");
      el("charleft").textContent=left;
    } else {
      ring.classList.remove("warn");
    }
  }
  function canPost(){
    el("compose-post").disabled = !(pendingImg || ta.value.trim().length>0);
  }
  var composeDest="all";
  function renderComposeDest(){
    var html='<span class="dlabel">Del til:</span>'+
      '<button class="fpill'+(composeDest==="all"?" on":"")+'" data-d="all">Hele kredsen</button>';
    state.feeds.forEach(function(f){
      html+='<button class="fpill'+(composeDest===f.id?" on":"")+'" data-d="'+esc(f.id)+'">'+esc(f.name)+'</button>';
    });
    el("compose-dest").innerHTML=html;
    var f=feedById(composeDest);
    ta.placeholder = f ? "Skriv til "+f.name+" …" : "Hvad sker der?";
  }
  el("compose-dest").addEventListener("click",function(e){
    var p=e.target.closest(".fpill");
    if(!p) return;
    composeDest=p.dataset.d;
    renderComposeDest();
  });
  function openCompose(){
    composeDest=state.currentFeed;
    renderComposeDest();
    el("compose").classList.add("on");
    setTimeout(function(){ ta.focus(); },260);
  }
  function closeCompose(){ el("compose").classList.remove("on"); }
  el("fab").addEventListener("click",openCompose);
  el("compose-cancel").addEventListener("click",closeCompose);

  ta.addEventListener("input",function(){ updateRing(); canPost(); });

  el("imgbtn").addEventListener("click",function(){ el("file-input").click(); });
  el("file-input").addEventListener("change",function(){
    var file=this.files && this.files[0];
    if(!file) return;
    var img=new Image();
    var url=URL.createObjectURL(file);
    img.onload=function(){
      var max=1440;
      var s=Math.min(1, max/Math.max(img.width,img.height));
      var c=document.createElement("canvas");
      c.width=Math.max(1,Math.round(img.width*s));
      c.height=Math.max(1,Math.round(img.height*s));
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);
      pendingImg=c.toDataURL("image/jpeg",0.87);
      el("attach-img").src=pendingImg;
      el("attach").classList.add("on");
      canPost();
    };
    img.onerror=function(){
      URL.revokeObjectURL(url);
      toast("Kunne ikke læse billedet");
    };
    img.src=url;
  });
  el("attach-remove").addEventListener("click",function(){
    pendingImg=null;
    el("attach").classList.remove("on");
    el("attach-img").removeAttribute("src");
    el("file-input").value="";
    canPost();
  });

  el("compose-post").addEventListener("click",function(){
    var text=ta.value.trim();
    if(!pendingImg && !text) return;
    var post={ id:state.nextId++, u:"dk", t:"nu", ts:"nu", liked:false, cmts:[] };
    if(text) post.text=text;
    if(pendingImg) post.img={src:pendingImg, alt:"Dit billede"};
    if(composeDest!=="all") post.feed=composeDest;
    state.posts.unshift(post);

    pendingImg=null;
    ta.value="";
    el("attach").classList.remove("on");
    el("attach-img").removeAttribute("src");
    el("file-input").value="";
    updateRing(); canPost();

    closeCompose();
    switchTab("feed");
    setFeed(composeDest);
    renderStories();
    var df=feedById(composeDest);
    toast(df ? "Delt i "+df.name : "Delt med hele kredsen");
  });

  /* ================= Søg / tilføj ven ================= */
  el("search-input").addEventListener("input",renderSearch);
  el("search-list").addEventListener("click",function(e){
    var a=e.target.closest(".addaction");
    if(!a) return;
    var h=a.dataset.add.toLowerCase().replace(/\s+/g,".");
    if(state.friends.indexOf(h)<0){
      state.friends.push(h);
      USERS[h]={name:a.dataset.add, g:FALLBACK[h.length%FALLBACK.length], since:"i dag"};
    }
    el("search-input").value="";
    renderSearch(); renderStories();
    toast(user(h).name+" er nu i din kreds");
  });

  el("editprof").addEventListener("click",function(){ toast("Profilredigering er ikke med i prototypen"); });

  /* ================= Init ================= */
  setTabIcons("feed");
  renderFeedbar();
  renderKredshead();
  renderComposeDest();
  renderStories();
  renderFeed();
})();
</script>
</body>
</html>
