<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<!-- CSP: script-src bruger 'unsafe-inline' indtil koden er stabil — skift til 'sha256-<hash>' af inline-scripts for fuld beskyttelse (hash skal genberegnes ved hver redigering). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' blob: https://iduotqxkohuezxkveawc.supabase.co; connect-src https://iduotqxkohuezxkveawc.supabase.co wss://iduotqxkohuezxkveawc.supabase.co; base-uri 'self'; form-action 'self'; object-src 'none'">
<title>Kreds</title>
<style>
  :root{
    --bg:#FFFFFF;
    --bg2:#FFFFFF;
    --ink:#0F1419;
    --gray:#536471;
    --line:#EFF3F4;
    --line2:#CFD9DE;
    --chip:#F7F9F9;
    --red:#E0402F;
    --red-dark:#C4351F;
    --scrim:rgba(0,0,0,.4);
    --toastbg:rgba(15,20,25,.82);
    --toastink:#fff;
    --glass:rgba(255,255,255,.58);
    --glass-strong:rgba(255,255,255,.78);
    --glass-edge:rgba(255,255,255,.65);
    --glass-hi:rgba(255,255,255,.6);
    --glass-shadow:0 12px 34px rgba(15,20,25,.16);
    --seg:rgba(15,20,25,.07);
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#15202B;
      --bg2:#1E2732;
      --ink:#F7F9F9;
      --gray:#8B98A5;
      --line:#2F3B45;
      --line2:#3E4C56;
      --chip:#1E2732;
      --scrim:rgba(91,112,131,.4);
      --toastbg:rgba(58,68,76,.85);
      --toastink:#fff;
      --glass:rgba(23,32,43,.55);
      --glass-strong:rgba(30,39,50,.80);
      --glass-edge:rgba(255,255,255,.14);
      --glass-hi:rgba(255,255,255,.16);
      --glass-shadow:0 14px 36px rgba(0,0,0,.55);
      --seg:rgba(255,255,255,.10);
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:#0A0A0A;
    min-height:100dvh;
    display:flex;justify-content:center;align-items:center;
  }
  button{font:inherit;cursor:pointer;background:none;border:none;color:inherit;-webkit-tap-highlight-color:transparent}
  input,textarea{font:inherit;color:inherit}
  img{-webkit-user-drag:none}
  :focus-visible{outline:2px solid var(--red);outline-offset:2px;border-radius:4px}

  .stroke{fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .fillic{fill:currentColor;stroke:none}

  /* ================= Telefon ================= */
  .phone{
    position:relative;
    width:100%;max-width:430px;
    height:100dvh;
    overflow:hidden;
    background:var(--bg);
  }
  @media(min-width:500px){
    body{padding:24px}
    .phone{
      height:min(932px,94vh);
      border-radius:54px;
      border:11px solid #0B0B0B;
      box-shadow:0 0 0 2px #2a2a2a,0 50px 100px rgba(0,0,0,.65);
    }
  }
  .island{display:none}
  @media(min-width:500px){
    .island{
      display:block;
      position:absolute;top:11px;left:50%;transform:translateX(-50%);
      width:122px;height:34px;border-radius:20px;background:#0B0B0B;z-index:130;
    }
  }
  .app{height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg)}

  /* ================= Statusbar (kun i ramme) ================= */
  .statusbar{
    display:none;
    position:sticky;top:0;z-index:60;
    height:52px;
    background:var(--glass);
    -webkit-backdrop-filter:blur(22px) saturate(1.8);
    backdrop-filter:blur(22px) saturate(1.8);
    align-items:center;justify-content:space-between;
    padding:14px 30px 0;
    font-size:15px;font-weight:600;
    color:var(--ink);
  }
  @media(min-width:500px){.statusbar{display:flex}}
  .statusbar .sicons{display:flex;align-items:center;gap:6px}
  .statusbar svg{display:block}

  /* ================= Topbar ================= */
  .topbar{
    position:sticky;top:0;z-index:50;
    display:flex;align-items:center;justify-content:space-between;
    height:52px;
    padding:0 16px;
    background:var(--glass);
    -webkit-backdrop-filter:blur(22px) saturate(1.8);
    backdrop-filter:blur(22px) saturate(1.8);
    border-bottom:1px solid var(--glass-edge);
    box-shadow:inset 0 1px 0 var(--glass-hi);
  }
  @media(min-width:500px){.topbar{top:52px}}
  .wordmark{
    font-family:Georgia,"Times New Roman",serif;
    font-weight:700;font-size:27px;letter-spacing:-.5px;
    color:var(--ink);
  }
  .wordmark .prik{color:var(--red)}
  .nosparkle{padding:6px 2px;color:var(--ink)}
  .nosparkle svg{width:23px;height:23px;display:block}

  /* ================= Stories ================= */
  .stories{
    display:flex;gap:14px;
    padding:12px 14px;
    overflow-x:auto;
    scrollbar-width:none;
    border-bottom:1px solid var(--line);
  }
  .stories::-webkit-scrollbar{display:none}
  .story{flex:0 0 auto;width:68px;text-align:center}
  .story .ring{
    width:62px;height:62px;margin:0 auto;border-radius:50%;
    padding:2.5px;
    background:linear-gradient(45deg,#FF9A3E,#E0402F,#B8288F);
  }
  .story .ring.seen{background:var(--line2)}
  .story .ring.none{background:var(--line)}
  .story .ava{
    width:100%;height:100%;border-radius:50%;
    border:2.5px solid var(--bg);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:19px;
  }
  .story .lbl{
    margin-top:5px;font-size:11px;color:var(--ink);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .story .ringwrap{position:relative;width:62px;margin:0 auto}
  .story .plusb{
    position:absolute;right:-1px;bottom:-1px;
    width:21px;height:21px;border-radius:50%;
    background:var(--red);color:#fff;
    border:2.5px solid var(--bg);
    display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;line-height:1;
  }

  /* ================= Kreds-vælger ================= */
  .feedbar{
    position:sticky;top:52px;z-index:45;
    display:flex;gap:8px;align-items:center;
    padding:9px 12px;
    overflow-x:auto;scrollbar-width:none;
    background:var(--glass);
    -webkit-backdrop-filter:blur(22px) saturate(1.8);
    backdrop-filter:blur(22px) saturate(1.8);
    border-bottom:1px solid var(--glass-edge);
  }
  @media(min-width:500px){.feedbar{top:104px}}
  .feedbar::-webkit-scrollbar{display:none}
  .fpill{
    flex:0 0 auto;
    border-radius:999px;
    padding:7px 15px;
    font-size:13.5px;font-weight:700;
    background:var(--glass-strong);
    border:1px solid var(--glass-edge);
    box-shadow:inset 0 1px 0 var(--glass-hi);
    color:var(--ink);
    transition:transform .18s cubic-bezier(.34,1.56,.64,1);
    white-space:nowrap;
  }
  .fpill:active{transform:scale(.92)}
  .fpill.on{background:var(--red);border-color:var(--red);color:#fff}
  .fpill.new{color:var(--red)}

  .kredshead{
    display:flex;align-items:center;gap:11px;
    padding:12px 16px;
    border-bottom:1px solid var(--line);
  }
  .mstack{display:flex}
  .mav{
    width:30px;height:30px;border-radius:50%;
    border:2px solid var(--bg);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:11px;
  }
  .mav+.mav{margin-left:-9px}
  .kredshead .ktxt{font-size:13px;color:var(--gray);line-height:1.35}
  .kredshead .ktxt b{color:var(--ink);font-weight:700;font-size:13.5px}

  /* ================= Views ================= */
  .view{display:none}
  .view.active{display:block}

  /* ================= Timeline-post (X-anatomi) ================= */
  .post{
    display:flex;gap:11px;
    padding:12px 16px 8px;
    border-bottom:1px solid var(--line);
  }
  .pava{
    width:42px;height:42px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:16px;
    flex:0 0 auto;
  }
  .pring{
    width:48px;height:48px;flex:0 0 auto;
    border-radius:50%;padding:2px;
    background:linear-gradient(45deg,#FF9A3E,#E0402F,#B8288F);
  }
  .pring.seen{background:var(--line2)}
  .pring.none{background:transparent;padding:0;width:42px;height:42px}
  .pring .pava{width:100%;height:100%;border:2px solid var(--bg)}
  .pring.none .pava{border:none}

  .pcol{flex:1;min-width:0}
  .hline{display:flex;align-items:center;gap:4px;min-width:0}
  .hline .nm{font-weight:700;font-size:15px;color:var(--ink);white-space:nowrap}
  .hline .badge{flex:0 0 auto;display:flex}
  .hline .badge svg{width:15px;height:15px}
  .hline .sub{
    color:var(--gray);font-size:14px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    min-width:0;
  }
  .hline .dots{margin-left:auto;color:var(--gray);padding:2px 0 2px 8px;flex:0 0 auto}
  .hline .dots svg{width:19px;height:19px}

  .ptext{margin-top:2px;font-size:15px;color:var(--ink);white-space:pre-wrap;overflow-wrap:break-word}
  .ptext.big{font-size:20px;line-height:1.35}

  .pmedia{
    position:relative;
    margin-top:10px;
    border-radius:16px;
    overflow:hidden;
    border:1px solid var(--line);
    background:var(--chip);
  }
  .pmedia img{display:block;width:100%;max-height:430px;object-fit:cover}

  .bigheart{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    pointer-events:none;
  }
  .bigheart svg{
    width:88px;height:88px;fill:#fff;stroke:none;
    filter:drop-shadow(0 4px 14px rgba(0,0,0,.35));
    opacity:0;
  }
  .bigheart.go svg{animation:bigpop .9s cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes bigpop{
    0%{opacity:0;transform:scale(.35)}
    18%{opacity:.95;transform:scale(1.12)}
    45%{opacity:.95;transform:scale(1)}
    78%{opacity:.95;transform:scale(1)}
    100%{opacity:0;transform:scale(.9) translateY(-10px)}
  }

  .pactions{
    display:flex;align-items:center;justify-content:space-between;
    max-width:270px;
    margin-top:8px;
    color:var(--gray);
  }
  .pactions button{display:flex;align-items:center;gap:6px;color:var(--gray);padding:4px 0;font-size:13px}
  .pactions svg{width:19px;height:19px}
  .pactions button:active{opacity:.6}
  .like-btn.on{color:var(--red)}
  .like-btn.on svg path{fill:var(--red);stroke:var(--red)}
  .like-btn.on svg{animation:pop .3s ease}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.25)}100%{transform:scale(1)}}

  /* ---------- Du er helt opdateret ---------- */
  .caughtup{
    text-align:center;
    padding:36px 20px 110px;
  }
  .caughtup .ring{
    width:80px;height:80px;border-radius:50%;
    margin:0 auto 14px;
    padding:3px;
    background:linear-gradient(45deg,#FF9A3E,#E0402F,#B8288F);
  }
  .caughtup .inner{
    width:100%;height:100%;border-radius:50%;
    background:var(--bg);
    display:flex;align-items:center;justify-content:center;
  }
  .caughtup .inner svg{width:36px;height:36px;stroke:var(--ink);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .caughtup h3{font-size:15px;font-weight:700;color:var(--ink)}
  .caughtup p{font-size:13.5px;color:var(--gray);margin-top:4px}

  /* ================= Søg ================= */
  .searchhead{
    padding:10px 16px 8px;position:sticky;top:52px;z-index:40;
    background:var(--glass);
    -webkit-backdrop-filter:blur(22px) saturate(1.8);
    backdrop-filter:blur(22px) saturate(1.8);
    border-bottom:1px solid var(--glass-edge);
  }
  @media(min-width:500px){.searchhead{top:104px}}
  .searchbox{
    display:flex;align-items:center;gap:9px;
    background:var(--glass-strong);
    border:1px solid var(--glass-edge);
    box-shadow:inset 0 1px 0 var(--glass-hi);
    border-radius:999px;
    padding:10px 15px;
  }
  .searchbox svg{width:17px;height:17px;color:var(--gray);flex:0 0 auto}
  .searchbox input{flex:1;min-width:0;border:none;background:transparent;font-size:15px}
  .searchbox input:focus{outline:none}
  .listrow{display:flex;align-items:center;gap:12px;padding:11px 16px}
  .ava44{
    width:44px;height:44px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:16px;flex:0 0 auto;
  }
  .listrow .grow{flex:1;min-width:0;line-height:1.3}
  .listrow .l1{font-weight:700;font-size:14.5px;color:var(--ink);display:flex;align-items:center;gap:4px}
  .listrow .l1 svg{width:14px;height:14px}
  .listrow .l2{font-size:13.5px;color:var(--gray)}
  .sectionlabel{font-size:17px;font-weight:800;padding:14px 16px 6px;color:var(--ink)}
  .addaction{color:var(--red);font-weight:700;font-size:14px;text-align:left}
  .emptynote{padding:18px 16px;color:var(--gray);font-size:14px}

  /* ================= Notifikationer ================= */
  .pagetitle{font-size:19px;font-weight:800;color:var(--ink);padding:12px 16px 8px;border-bottom:1px solid var(--line)}
  .notif{
    display:flex;gap:12px;
    padding:12px 16px;
    border-bottom:1px solid var(--line);
  }
  .notif .nicon{width:26px;flex:0 0 auto;display:flex;justify-content:center;padding-top:2px}
  .notif .nicon svg{width:22px;height:22px}
  .notif .nicon.heart{color:var(--red)}
  .notif .nicon.heart svg path{fill:var(--red);stroke:var(--red)}
  .notif .nicon.bubble{color:#7856FF}
  .notif .nicon.friend{color:var(--red)}
  .notif .grow{flex:1;min-width:0}
  .notif .ava28{
    width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:11px;
    margin-bottom:7px;
  }
  .notif .ntext{font-size:14.5px;color:var(--ink)}
  .notif .ntext b{font-weight:700}
  .notif .nsnip{font-size:14px;color:var(--gray);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .notif .nt{color:var(--gray);font-size:13px;flex:0 0 auto}

  /* ================= Profil ================= */
  .banner{height:110px;background:linear-gradient(60deg,#E0402F,#FF7A45,#B8288F)}
  .prow{display:flex;align-items:flex-end;justify-content:space-between;padding:0 16px;margin-top:-40px}
  .ava80{
    width:82px;height:82px;border-radius:50%;
    border:4px solid var(--bg);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:30px;
  }
  .editbtn{
    background:var(--glass-strong);
    -webkit-backdrop-filter:blur(16px) saturate(1.7);
    backdrop-filter:blur(16px) saturate(1.7);
    border:1px solid var(--glass-edge);
    box-shadow:inset 0 1px 0 var(--glass-hi);
    border-radius:999px;
    padding:7px 16px;
    font-weight:700;font-size:14px;
    color:var(--ink);
    margin-bottom:6px;
  }
  .pname{padding:10px 16px 0}
  .pname .n{font-size:20px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:5px}
  .pname .n svg{width:17px;height:17px}
  .pname .h{font-size:14.5px;color:var(--gray)}
  .pbio{padding:10px 16px 4px;font-size:15px;color:var(--ink)}
  .pmeta{padding:6px 16px 12px;font-size:14.5px;color:var(--gray);border-bottom:1px solid var(--line)}
  .pmeta b{color:var(--ink);font-weight:700}
  .ptl{font-size:15px;font-weight:800;padding:12px 16px;border-bottom:1px solid var(--line);color:var(--ink)}

  /* ================= Tabbar ================= */
  .tabbar{
    position:sticky;bottom:14px;z-index:50;
    display:flex;align-items:center;justify-content:space-around;
    height:62px;
    margin:12px 16px calc(14px + env(safe-area-inset-bottom));
    border-radius:34px;
    background:var(--glass);
    -webkit-backdrop-filter:blur(24px) saturate(1.9);
    backdrop-filter:blur(24px) saturate(1.9);
    border:1px solid var(--glass-edge);
    box-shadow:var(--glass-shadow),inset 0 1px 0 var(--glass-hi);
    padding:0 6px;
  }
  .tabbar button{
    display:flex;align-items:center;justify-content:center;
    width:56px;height:44px;border-radius:22px;
    color:var(--ink);
    transition:transform .18s cubic-bezier(.34,1.56,.64,1),background .18s ease;
  }
  .tabbar button:active{transform:scale(.86)}
  .tabbar button.active{background:var(--seg)}
  .tabbar svg{width:25px;height:25px}

  /* ================= FAB ================= */
  .fab{
    position:absolute;right:20px;bottom:calc(102px + env(safe-area-inset-bottom));z-index:55;
    width:58px;height:58px;border-radius:50%;
    background:linear-gradient(160deg,#FF6A4D,var(--red));
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    border:1px solid rgba(255,255,255,.45);
    box-shadow:0 14px 30px rgba(224,64,47,.45),0 3px 8px rgba(0,0,0,.22),inset 0 1.5px 0 rgba(255,255,255,.55);
    transition:transform .18s cubic-bezier(.34,1.56,.64,1);
  }
  .fab svg{width:25px;height:25px;stroke-width:2.2}
  .fab:active{transform:scale(.94)}

  /* ================= Overlays ================= */
  .scrim{
    position:absolute;inset:0;z-index:80;
    background:var(--scrim);
    -webkit-backdrop-filter:blur(3px);
    backdrop-filter:blur(3px);
    opacity:0;pointer-events:none;
    transition:opacity .2s ease;
  }
  .scrim.on{opacity:1;pointer-events:auto}

  /* ---- Kommentarer ---- */
  .cmtsheet{
    position:absolute;left:0;right:0;bottom:0;z-index:85;
    height:74%;
    background:var(--glass-strong);
    -webkit-backdrop-filter:blur(28px) saturate(1.9);
    backdrop-filter:blur(28px) saturate(1.9);
    border:1px solid var(--glass-edge);
    border-bottom:none;
    border-radius:22px 22px 0 0;
    transform:translateY(105%);
    transition:transform .28s cubic-bezier(.32,.72,.25,1);
    display:flex;flex-direction:column;
    box-shadow:0 -10px 40px rgba(0,0,0,.2),inset 0 1px 0 var(--glass-hi);
  }
  .cmtsheet.on{transform:translateY(0)}
  .cmt-grab{width:38px;height:4px;border-radius:2px;background:var(--line2);margin:8px auto 6px}
  .cmt-title{
    text-align:center;font-weight:800;font-size:15px;color:var(--ink);
    padding-bottom:10px;border-bottom:1px solid var(--line);
  }
  .cmt-list{flex:1;overflow-y:auto;padding:4px 0}
  .cmt-row{display:flex;gap:11px;padding:11px 16px;align-items:flex-start}
  .ava34{
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:13px;flex:0 0 auto;
  }
  .cmt-row .body{flex:1;min-width:0;font-size:14px;line-height:1.4;color:var(--ink)}
  .cmt-row .body b{font-weight:700}
  .cmt-row .body .t{color:var(--gray);font-weight:400;font-size:13px;margin-left:5px}
  .cmt-row .body .txt{margin-top:1px}
  .cmt-row .likec{padding:6px 2px;color:var(--gray)}
  .cmt-row .likec svg{width:14px;height:14px}
  .cmt-row .likec.on{color:var(--red)}
  .cmt-row .likec.on svg path{fill:var(--red);stroke:var(--red)}
  .cmt-cap{border-bottom:1px solid var(--line);margin-bottom:2px}
  .cmt-input{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px calc(12px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);
  }
  .cmt-input input{flex:1;min-width:0;border:none;font-size:14.5px;background:transparent}
  .cmt-input input:focus{outline:none}
  .cmt-post{color:var(--red);font-weight:800;font-size:14px}
  .cmt-post:disabled{opacity:.35;cursor:default}

  /* ---- Ny kreds ---- */
  .fsheet{
    position:absolute;left:0;right:0;bottom:0;z-index:86;
    max-height:80%;
    background:var(--glass-strong);
    -webkit-backdrop-filter:blur(28px) saturate(1.9);
    backdrop-filter:blur(28px) saturate(1.9);
    border:1px solid var(--glass-edge);border-bottom:none;
    border-radius:22px 22px 0 0;
    transform:translateY(105%);
    transition:transform .28s cubic-bezier(.32,.72,.25,1);

      </button>

  <div class="fsheet" id="esheet" role="dialog" aria-label="Rediger profil">

    <div class="cmt-title">Rediger profil</div>
    <div class="fs-label">Dit navn</div>
    <div class="fs-name">
      <input id="ep-name" placeholder="Dit navn" maxlength="40">
    </div>

  <!-- Auth -->
  <div class="authview" id="authview">
    <div class="wordmark">kreds<span class="prik">.</span></div>
    <div class="auth-tag">Ingen algoritme. Bare din kreds.</div>

      <input type="password" id="li-pass" placeholder="Adgangskode" autocomplete="current-password" required>
      <div class="auth-err" id="li-err"></div>
      <button class="auth-btn" id="li-btn" type="submit">Log ind</button>

    <form class="auth-form" id="auth-signup" style="display:none" autocomplete="on">
      <input type="text" id="su-name" placeholder="Navn" autocomplete="name" maxlength="40" required>
      <input type="text" id="su-handle" placeholder="Brugernavn" autocomplete="username" autocapitalize="none" spellcheck="false" maxlength="20" required>
      <input type="email" id="su-email" placeholder="E-mail" autocomplete="email" required>
      <input type="password" id="su-pass" placeholder="Adgangskode (mindst 6 tegn)" autocomplete="new-password" required>
      <div class="auth-err" id="su-err"></div>
      <button class="auth-btn" id="su-btn" type="submit">Opret profil</button>

function fallbackGrad(h){
  let x = 0;
  for(let i = 0; i < h.length; i++) x = (x*31 + h.charCodeAt(i)) >>> 0;
  return FALLBACK[x % FALLBACK.length];
}
function registerProfile(p){
  if(!p || !p.handle) return;
  let g = [p.color1, p.color2];
  if(!g[0] || !g[1]) g = fallbackGrad(p.handle);
  USERS[p.handle] = {
    name: p.name || p.handle,
    g: g,
    since: p.created_at ? new Date(p.created_at).getFullYear() : "",
    id: p.id
  };
  if(p.id) ID2H[p.id] = p.handle;
}
function user(h){
  if(!USERS[h]) USERS[h] = { name: h, g: fallbackGrad(h), since: "" };
  return USERS[h];
}
function grad(h){ const g = user(h).g; return "linear-gradient(140deg,"+g[0]+","+g[1]+")"; }
function ini(h){
  const n = (user(h).name || h).trim().split(/\s+/);
  const a = (n[0] && n[0][0]) || (h && h[0]) || "?";
  return (a + (n[1] ? n[1][0] : "")).toUpperCase().replace(/[^\p{L}\p{M}\p{N}]/gu, "") || "?";
}
function tgrad(id){
  const g = TXT_GRADS[Math.abs(Number(id) || 0) % TXT_GRADS.length];
  return "linear-gradient(135deg,"+g[0]+","+g[1]+","+g[2]+")";
}

const MONTHS = ["januar","februar","marts","april","maj","juni","juli","august","september","oktober","november","december"];
function fmtTime(iso){
  const d = new Date(iso);
  const s = Math.max(0, (Date.now() - d.getTime())/1000);
  if(s < 60) return "nu";
  if(s < 3600) return Math.floor(s/60)+"m";
  if(s < 86400) return Math.floor(s/3600)+"t";
  if(s < 7*86400) return Math.floor(s/86400)+"d";
  return d.getDate()+". "+MONTHS[d.getMonth()];
}
function imgUrl(path){
  return sb.storage.from("post-images").getPublicUrl(path).data.publicUrl;
}
function uuid(){
  if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c){
    const r = Math.random()*16|0;
    return (c === "x" ? r : (r&0x3|0x8)).toString(16);
  });
}

const POST_SELECT = "*, author_profile:profiles!author(*), comments(*, author_profile:profiles!author(*)), likes(user_id)";

function mapComment(c){
  if(c.author_profile) registerProfile(c.author_profile);
  return {
    id: c.id,
    u: c.author_profile ? c.author_profile.handle : (ID2H[c.author] || "?"),
    text: c.text,
    t: fmtTime(c.created_at),
    liked: false,
    likeCount: 0
  };
}
function mapPost(row){
  if(row.author_profile) registerProfile(row.author_profile);
  const h = row.author_profile ? row.author_profile.handle : (ID2H[row.author] || "?");
  const likes = row.likes || [];
  const cmts = (row.comments || []).slice()
    .sort(function(a,b){ return new Date(a.created_at) - new Date(b.created_at); })
    .map(mapComment);
  return {
    id: row.id,
    u: h,
    created: row.created_at,
    t: fmtTime(row.created_at),
    ts: fmtTime(row.created_at),
    text: row.text || undefined,
    img: row.image_path ? { src: imgUrl(row.image_path), alt: "Billede" } : undefined,
    liked: !!(me && likes.some(function(l){ return l.user_id === me.id; })),
    likeCount: likes.length,
    feed: row.feed_id || undefined,
    cmts: cmts
  };
}

/* ================= Historie-afledning ================= */
function storyItems(h){
  const cut = Date.now() - 24*3600*1000;
  return state.wholePosts
    .filter(function(p){ return p.u === h && new Date(p.created).getTime() >= cut; })
    .slice(0, 4)
    .slice()
    .reverse(); // ældste først
}
function latestStoryId(h){
  const it = storyItems(h);
  return it.length ? it[it.length-1].id : null;
}
function hasStory(h){ return storyItems(h).length > 0; }
function isSeen(h){
  const l = latestStoryId(h);
  return l != null && state.seen[h] === l;
}

/* ================= Data-hentning ================= */
function postQuery(){
  return sb.from("posts").select(POST_SELECT)
    .order("created_at", { ascending:false })
    .order("created_at", { ascending:true, referencedTable:"comments" })
    .limit(100);
}
async function loadPosts(){
  if(!me) return;
  try{
    const reqs = [ postQuery().is("feed_id", null) ];
    const cur = state.currentFeed;
    if(cur !== "all") reqs.push(postQuery().eq("feed_id", cur));
    const res = await Promise.all(reqs);
    if(state.currentFeed !== cur) return;
    for(const r of res){ if(r.error) throw r.error; }
    state.wholePosts = (res[0].data || []).map(mapPost);
    state.posts = cur === "all" ? state.wholePosts : (res[1].data || []).map(mapPost);
    renderFeed();
    renderStories();
    if(el("view-profil").classList.contains("active")) renderMyPosts();
  }catch(err){
    console.error(err);
    toast("Kunne ikke hente opslag. Prøv igen.");
  }
}
async function loadFriends(){
  if(!me) return;
  const { data, error } = await sb.from("friendships")
    .select("created_at, friend_profile:profiles!friend_id(*)")
    .eq("user_id", me.id);
  if(error){ console.error(error); toast(GENERIC_ERR); return; }
  const hs = [];
  (data || []).forEach(function(r){
    if(r.friend_profile){
      registerProfile(r.friend_profile);
      FRIEND_SINCE[r.friend_profile.handle] = new Date(r.created_at).getFullYear();
      hs.push(r.friend_profile.handle);
    }
  });
  hs.sort();
  state.friends = hs;
  el("stat-friends").textContent = hs.length;
}
async function loadFeeds(){
  if(!me) return;
  const { data, error } = await sb.from("feeds").select("*, feed_members(user_id)");
  if(error){ console.error(error); toast(GENERIC_ERR); return; }
  const feeds = (data || []).map(function(f){
    return { id:f.id, name:f.name, created:f.created_at, memberIds:(f.feed_members||[]).map(function(m){ return m.user_id; }) };
  });
  feeds.sort(function(a,b){ return new Date(a.created) - new Date(b.created); });
  const unknown = [];
  feeds.forEach(function(f){
    f.memberIds.forEach(function(id){
      if(!ID2H[id] && unknown.indexOf(id) < 0) unknown.push(id);
    });
  });
  if(unknown.length){
    const r = await sb.from("profiles").select("*").in("id", unknown);
    if(!r.error) (r.data || []).forEach(registerProfile);
  }
  feeds.forEach(function(f){
    f.members = f.memberIds.map(function(id){ return ID2H[id]; }).filter(Boolean);
  });
  state.feeds = feeds;
}

  return null;
}

  });
  html += '<button class="fpill new" data-feed="__new">+ Ny kreds</button>';
  el("feedbar").innerHTML = html;
}
function renderKredshead(){
  const kh = el("kredshead");
  if(state.currentFeed === "all"){
    kh.style.display = "none";
    el("stories").style.display = "flex";
    return;
  }
  const f = feedById(state.currentFeed);
  if(!f){ kh.style.display = "none"; el("stories").style.display = "flex"; return; }
  el("stories").style.display = "none";
  const avs = f.members.map(function(m){
    return '<span class="mav" style="background:'+grad(m)+'">'+ini(m)+'</span>';
  }).join("");
  kh.innerHTML = '<div class="mstack">'+avs+'</div>'+
    '<div class="ktxt"><b>'+f.members.length+' medlemmer</b><br>Privat kreds — kun jer kan se og skrive her.</div>';
  kh.style.display = "flex";
}
function setFeed(id){

  });

  if(!html){
    html = '<div class="emptynote">'+(q ? "Ingen i din kreds matcher." : "Din kreds er tom endnu. Søg efter dine venner her 🔍")+'</div>';
  }
  el("search-list").innerHTML = html;
}
async function runGlobalSearch(q){
  if(!me) return;
  const safe = q.replace(/[\\"]/g, "");
  if(!safe) return;
  const { data, error } = await sb.from("profiles").select("*")
    .or('handle.ilike."*'+safe+'*",name.ilike."*'+safe+'*"')
    .neq("id", me.id)
    .limit(10);
  if(error){ console.error(error); return; }
  const cur = (el("search-input").value || "").trim().toLowerCase();
  if(cur !== q) return;
  (data || []).forEach(registerProfile);
  globalResults = (data || []).filter(function(p){ return state.friends.indexOf(p.handle) < 0; });
  globalQ = q;
  renderSearch();
}
el("search-input").addEventListener("input", function(){
  const q = this.value.trim().toLowerCase();
  clearTimeout(searchTimer);
  if(q !== globalQ){ globalResults = []; globalQ = ""; }
  renderSearch();
  if(q){
    searchTimer = setTimeout(function(){ runGlobalSearch(q); }, 300);
  }
});
el("search-list").addEventListener("click", async function(e){
  const a = e.target.closest(".addaction");
  if(!a || !me) return;
  const h = a.dataset.add;
  a.disabled = true;
  const { data, error } = await sb.rpc("add_friend", { friend_handle:h });
  if(error){
    a.disabled = false;
    const m = String(error.message || "");
    if(m.indexOf("not_found") >= 0) toast("Ingen bruger med det navn");
    else if(m.indexOf("self") >= 0) toast("Det er dig selv 😄");
    else toast(GENERIC_ERR);
    return;
  }
  if(data) registerProfile(data);
  el("search-input").value = "";
  globalResults = []; globalQ = "";
  await loadFriends();
  renderSearch();
  renderStories();
  loadPosts();
  toast(user(h).name + " er nu i din kreds");
});

/* ================= Notifikationer ================= */
async function loadNotifs(){
  if(!me) return;
  el("notifs").innerHTML = '<div class="emptynote">Henter …</div>';
  const H = '<svg viewBox="0 0 24 24"><path class="stroke" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
  const B = '<svg viewBox="0 0 24 24"><path class="stroke" d="M12 3.3a8.7 8.7 0 0 0-7.4 13.2L3.4 20.6l4.2-1.1A8.7 8.7 0 1 0 12 3.3Z"/></svg>';
  const P = '<svg viewBox="0 0 24 24"><g class="stroke"><circle cx="10" cy="8" r="3.4"/><path d="M3.8 19.5c.7-3.3 3.2-5 6.2-5s5.5 1.7 6.2 5"/><path d="M18.5 6.5v6M15.5 9.5h6"/></g></svg>';
  function row(icon, cls, u, text, snip, t){
    return '<div class="notif">'+
      '<div class="nicon '+cls+'">'+icon+'</div>'+
      '<div class="grow">'+
        '<div class="ava28" style="background:'+grad(u)+'">'+ini(u)+'</div>'+
        '<div class="ntext"><b>'+esc(user(u).name)+'</b> '+text+'</div>'+
        (snip ? '<div class="nsnip">'+esc(snip)+'</div>' : '')+
      '</div>'+
      '<span class="nt">'+esc(t)+'</span>'+
    '</div>';
  }
  try{
    const mine = await sb.from("posts").select("id, text, image_path").eq("author", me.id);
    if(mine.error) throw mine.error;
    const ids = (mine.data || []).map(function(p){ return p.id; });
    const textById = {};
    (mine.data || []).forEach(function(p){ textById[p.id] = p.text || (p.image_path ? "📷 Billede" : ""); });

    const reqs = [ sb.from("friendships").select("created_at, from_profile:profiles!user_id(*)").eq("friend_id", me.id) ];
    if(ids.length){
      reqs.push(sb.from("likes").select("created_at, post_id, liker:profiles!user_id(*)").in("post_id", ids).neq("user_id", me.id));
      reqs.push(sb.from("comments").select("created_at, post_id, text, author_profile:profiles!author(*)").in("post_id", ids).neq("author", me.id));
    }
    const res = await Promise.all(reqs);
    for(const r of res){ if(r.error) throw r.error; }

    const items = [];
    (res[0].data || []).forEach(function(r){
      if(r.from_profile){ registerProfile(r.from_profile); items.push({ type:"friend", u:r.from_profile.handle, at:r.created_at }); }
    });
    if(ids.length){
      (res[1].data || []).forEach(function(r){
        if(r.liker){ registerProfile(r.liker); items.push({ type:"like", u:r.liker.handle, at:r.created_at, snip:textById[r.post_id] || "" }); }
      });
      (res[2].data || []).forEach(function(r){
        if(r.author_profile){ registerProfile(r.author_profile); items.push({ type:"cmt", u:r.author_profile.handle, at:r.created_at, snip:r.text }); }
      });
    }
    items.sort(function(a,b){ return new Date(b.at) - new Date(a.at); });
    const top = items.slice(0, 30);
    el("notifs").innerHTML = top.length
      ? top.map(function(n){
          if(n.type === "like")   return row(H, "heart",  n.u, "nikkede til dit opslag", n.snip, fmtTime(n.at));
          if(n.type === "cmt")    return row(B, "bubble", n.u, "svarede på dit opslag",  n.snip, fmtTime(n.at));
          return row(P, "friend", n.u, "er nu i din kreds", "", fmtTime(n.at));
        }).join("")
      : '<div class="emptynote">Ingen notifikationer endnu.</div>';
  }catch(err){
    console.error(err);
    el("notifs").innerHTML = '<div class="emptynote">Kunne ikke hente notifikationer. Prøv igen.</div>';
  }
}

const pv = { u:null, posts:[] };
const story = { list:[], idx:0, u:null, timer:null };

function allPostArrays(){ return [state.posts, state.wholePosts, pv.posts, story.list]; }
function findPost(id){
  id = Number(id);
  const arrs = allPostArrays();
  for(let a = 0; a < arrs.length; a++){
    for(let i = 0; i < arrs[a].length; i++){
      if(Number(arrs[a][i].id) === id) return arrs[a][i];
    }
  }
  return null;
}
function findPostAll(id){
  id = Number(id);
  const out = [];
  allPostArrays().forEach(function(arr){
    arr.forEach(function(p){
      if(Number(p.id) === id && out.indexOf(p) < 0) out.push(p);
    });
  });
  return out;
}
function applyLikeUI(id, on){
  document.querySelectorAll('.post[data-id="'+id+'"]').forEach(function(node){
    const btn = node.querySelector(".like-btn");
    if(btn){ btn.classList.toggle("on", on); btn.setAttribute("aria-pressed", on); }
  });
  if(el("storyview").classList.contains("on")){
    const it = story.list[story.idx];
    if(it && Number(it.id) === Number(id)) el("story-heart").classList.toggle("on", on);
  }
}
async function setLike(id, force){
  if(!me) return;
  const objs = findPostAll(id);
  if(!objs.length) return;
  const cur = objs[0].liked;
  const on = (force === undefined) ? !cur : !!force;
  if(on === cur) return;
  objs.forEach(function(p){ p.liked = on; p.likeCount = Math.max(0, (p.likeCount||0) + (on ? 1 : -1)); });
  applyLikeUI(id, on);
  let error = null;
  if(on){
    const r = await sb.from("likes").insert({ post_id:Number(id), user_id:me.id });
    error = (r.error && r.error.code !== "23505") ? r.error : null;
  } else {
    const r = await sb.from("likes").delete().eq("post_id", Number(id)).eq("user_id", me.id);
    error = r.error;
  }
  if(error){
    console.error(error);
    objs.forEach(function(p){ p.liked = cur; p.likeCount = Math.max(0, p.likeCount + (on ? -1 : 1)); });
    applyLikeUI(id, cur);
    toast(GENERIC_ERR);
  }
}

  const p = findPost(openPostId);

  const { data, error } = await sb.from("comment_likes").select("comment_id, user_id").in("comment_id", ids);

  p.cmts.forEach(function(c){

function renderComments(){

  let error = null;
  if(on){

let lastTap = { id:null, t:0 };
function timelineClick(e){
  const like = e.target.closest(".like-btn");
  if(like){ setLike(like.dataset.id); return; }
  const cmt = e.target.closest(".cmt-btn");
  if(cmt){ openComments(cmt.dataset.id); return; }

  const d = e.target.closest(".dots");
  if(d){ toast("Intet skjult her — feedet er altid kronologisk"); return; }
  const pr = e.target.closest(".pring");
  if(pr && pr.dataset.storyof){
    if(me && pr.dataset.storyof === me.handle){ closeProfile(); switchTab("profil"); }
    else openProfile(pr.dataset.storyof);
    return;
  }
  const media = e.target.closest(".pmedia");
  if(media){
    const id = media.dataset.id;
    const now = Date.now();
    if(lastTap.id === id && now - lastTap.t < 320){
      setLike(id, true);
      const bh = media.querySelector(".bigheart");
      bh.classList.remove("go");
      void bh.offsetWidth;
      bh.classList.add("go");
      lastTap = { id:null, t:0 };
    } else {
      lastTap = { id:id, t:now };
    }
  }
}

function renderStorySlide(){
  clearTimeout(story.timer);
  const it = story.list[story.idx];
  el("story-time").textContent = it.ts || "";
  const m = el("story-media");
  if(it.img){
    m.innerHTML = '<img src="'+esc(it.img.src)+'" alt="'+esc(it.img.alt||"")+'">';
  } else {
    m.innerHTML = '<div class="story-textslide" style="background:'+tgrad(it.id)+'"><span>'+esc(it.text)+'</span></div>';
  }
  el("story-heart").classList.toggle("on", !!it.liked);

  let bars = '';
  for(let i = 0; i < story.list.length; i++) bars += '<div class="bar"><i></i></div>';
  el("story-bars").innerHTML = bars;
  const fills = el("story-bars").querySelectorAll("i");
  fills.forEach(function(f,i){ f.style.width = i < story.idx ? "100%" : "0"; });
  const active = fills[story.idx];
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      active.style.transition = "width 5s linear";
      active.style.width = "100%";
    });
  });
  story.timer = setTimeout(nextStory, 5000);
}
function nextStory(){
  if(story.idx < story.list.length-1){ story.idx++; renderStorySlide(); }
  else closeStory();
}
function prevStory(){
  if(story.idx > 0){ story.idx--; }
  renderStorySlide();
}

function updateRing(){

  el("attach-img").removeAttribute("src");

el("imgbtn").addEventListener("click", function(){ el("file-input").click(); });
el("file-input").addEventListener("change", function(){
  const file = this.files && this.files[0];
  if(!file) return;
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = function(){
    const max = 1440;
    const s = Math.min(1, max/Math.max(img.width, img.height));
    const c = document.createElement("canvas");
    c.width = Math.max(1, Math.round(img.width*s));
    c.height = Math.max(1, Math.round(img.height*s));
    c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
    URL.revokeObjectURL(url);
    c.toBlob(function(blob){
      if(!blob){ toast("Kunne ikke læse billedet"); return; }
      clearPendingImg();
      const purl = URL.createObjectURL(blob);
      pendingImg = { blob:blob, url:purl };
      el("attach-img").src = purl;
      el("attach").classList.add("on");
      canPost();
    }, "image/jpeg", 0.87);
  };
  img.onerror = function(){
    URL.revokeObjectURL(url);
    toast("Kunne ikke læse billedet");
  };
  img.src = url;
});
el("attach-remove").addEventListener("click", function(){
  clearPendingImg();
  canPost();
});

el("compose-post").addEventListener("click", async function(){
  if(!me) return;
  const text = ta.value.trim();
  if(!pendingImg && !text) return;
  const dest = composeDest;
  const btn = this;
  btn.disabled = true;
  let path = null;
  try{
    if(pendingImg){
      path = me.id + "/" + uuid() + ".jpg";
      const up = await sb.storage.from("post-images").upload(path, pendingImg.blob, { contentType:"image/jpeg" });
      if(up.error) throw up.error;
      if(up.data && up.data.path) path = up.data.path;
    }
    const ins = await sb.from("posts").insert({
      author: me.id,
      feed_id: dest === "all" ? null : dest,
      text: text || null,
      image_path: path
    });
    if(ins.error) throw ins.error;

    clearPendingImg();
    ta.value = "";
    updateRing();
    closeCompose();
    switchTab("feed");
    setFeed(dest);
    const df = feedById(dest);
    toast(df ? "Delt i "+df.name : "Delt med hele kredsen");
  }catch(err){
    console.error(err);
    if(path){ sb.storage.from("post-images").remove([path]).catch(function(){}); }
    toast("Kunne ikke dele. Prøv igen.");
  }finally{
    btn.disabled = false;
    canPost();
  }
});

/* ================= Realtime + fokus ================= */
let channel = null, refetchTimer = null;
function scheduleRefetch(){
  clearTimeout(refetchTimer);
  refetchTimer = setTimeout(doRefetch, 400);
}
async function doRefetch(){
  if(!me) return;
  await Promise.all([loadFriends(), loadFeeds(), loadPosts()]);
  renderFeedbar();
  renderKredshead();
  renderComposeDest();
  renderFeed();
  renderStories();
  if(el("view-search").classList.contains("active")) renderSearch();
  if(el("profileview").classList.contains("on") && pv.u) await loadPvPosts();
  if(el("cmtsheet").classList.contains("on") && openPostId != null){
    renderComments();
    loadCommentLikes();
  }
}
function subscribeRealtime(){
  if(channel) return;
  channel = sb.channel("db-changes")
    .on("postgres_changes", { event:"*", schema:"public", table:"posts" }, scheduleRefetch)
    .on("postgres_changes", { event:"*", schema:"public", table:"comments" }, scheduleRefetch)
    .on("postgres_changes", { event:"*", schema:"public", table:"likes" }, scheduleRefetch)
    .subscribe();
}
function unsubscribeRealtime(){
  if(channel){ sb.removeChannel(channel); channel = null; }
  clearTimeout(refetchTimer);
}
window.addEventListener("focus", function(){ if(me) scheduleRefetch(); });

/* ================= Auth ================= */
const SIGNUP_ERRORS = {
  bad_email: "Skriv en gyldig e-mail",
  bad_password: "Adgangskoden skal være mindst 6 tegn",
  bad_name: "Navn: 1-40 tegn",
  bad_handle: "Brugernavn: 2-20 tegn — kun små bogstaver, tal, punktum og _",
  handle_taken: "Brugernavnet er taget",
  email_taken: "Der findes allerede en profil med den e-mail",
  signup_failed: "Noget gik galt. Prøv igen."
};
let authMode = "login";
function showAuth(msg){
  el("authview").classList.add("on");
  el("li-err").textContent = msg || "";
  el("su-err").textContent = "";
}
function hideAuth(){
  el("authview").classList.remove("on");
  el("li-pass").value = "";
  el("su-pass").value = "";
  el("li-err").textContent = "";
  el("su-err").textContent = "";
}
el("auth-toggle").addEventListener("click", function(){
  authMode = authMode === "login" ? "signup" : "login";
  el("auth-login").style.display = authMode === "login" ? "flex" : "none";
  el("auth-signup").style.display = authMode === "signup" ? "flex" : "none";
  el("auth-alt-txt").textContent = authMode === "login" ? "Har du ikke en profil?" : "Har du allerede en profil?";
  el("auth-toggle").textContent = authMode === "login" ? "Opret en" : "Log ind";
  el("li-err").textContent = "";
  el("su-err").textContent = "";
});
el("su-handle").addEventListener("input", function(){
  const v = this.value.toLowerCase().trim();
  if(v !== this.value) this.value = v;
});
el("auth-login").addEventListener("submit", async function(e){
  e.preventDefault();
  const email = el("li-email").value.trim();
  const pass = el("li-pass").value;
  if(!email || !pass) return;
  el("li-err").textContent = "";
  const btn = el("li-btn");
  btn.disabled = true;
  try{
    const { data, error } = await sb.auth.signInWithPassword({ email:email, password:pass });
    if(error){
      el("li-err").textContent = (error.code === "invalid_credentials" || /invalid/i.test(error.message || ""))
        ? "Forkert e-mail eller adgangskode"
        : GENERIC_ERR;
      return;
    }
    await boot(data.session);
  }catch(err){
    console.error(err);
    el("li-err").textContent = GENERIC_ERR;
  }finally{
    btn.disabled = false;
  }
});
el("auth-signup").addEventListener("submit", async function(e){
  e.preventDefault();
  const name = el("su-name").value.trim();
  const handle = el("su-handle").value.trim().toLowerCase();
  const email = el("su-email").value.trim();
  const pass = el("su-pass").value;
  el("su-err").textContent = "";
  const btn = el("su-btn");
  btn.disabled = true;
  try{
    const { error } = await sb.functions.invoke("signup", { body:{ email:email, password:pass, name:name, handle:handle } });
    if(error){
      let code = "";
      try{
        const b = await error.context.json();
        code = (b && b.error) || "";
      }catch(_e){}
      el("su-err").textContent = SIGNUP_ERRORS[code] || GENERIC_ERR;
      return;
    }
    const si = await sb.auth.signInWithPassword({ email:email, password:pass });
    if(si.error){
      el("su-err").textContent = "Profilen er oprettet, men login fejlede. Prøv at logge ind.";
      return;
    }
    await boot(si.data.session);
  }catch(err){
    console.error(err);
    el("su-err").textContent = GENERIC_ERR;
  }finally{
    btn.disabled = false;
  }
});

/* ================= Boot ================= */
async function boot(session){
  if(!session){ showAuth(); return; }
  const { data:prof, error } = await sb.from("profiles").select("*").eq("id", session.user.id).maybeSingle();
  if(error){
    console.error(error);
    showAuth("Kunne ikke hente din profil. Tjek din forbindelse og prøv igen.");
    return;
  }
  if(!prof){
    await sb.auth.signOut();
    showAuth("Noget gik galt. Prøv at logge ind igen.");
    return;
  }
  me = prof;
  registerProfile(me);
  loadSeen();
  setOwnUI();
  state.currentFeed = "all";
  await Promise.all([loadFriends(), loadFeeds(), loadPosts()]);
  renderFeedbar();
  renderKredshead();
  renderComposeDest();
  renderStories();
  renderFeed();
  switchTab("feed");
  subscribeRealtime();
  hideAuth();
}
function resetApp(){
  unsubscribeRealtime();
  me = null;
  switchTab("feed");
  Object.keys(FRIEND_SINCE).forEach(function(k){ delete FRIEND_SINCE[k]; });
  state.seen = {};
  state.friends = [];
  state.posts = [];
  state.wholePosts = [];
  state.feeds = [];
  state.currentFeed = "all";
  pv.u = null;
  pv.posts = [];
  story.list = [];
  clearTimeout(story.timer);
  el("storyview").classList.remove("on");
  closeComments();
  closeFeedSheet();
  closeEditSheet();
  closeCompose();
  closeProfile();
  clearPendingImg();
  ta.value = "";
  updateRing();
  canPost();
  el("feed").innerHTML = "";
  el("stories").innerHTML = "";
  el("feedbar").innerHTML = "";
  el("notifs").innerHTML = "";
  el("search-list").innerHTML = "";
  el("search-input").value = "";
  el("myposts").innerHTML = "";
  el("stat-posts").textContent = "0";
  el("stat-friends").textContent = "0";
  globalResults = []; globalQ = "";
  el("su-name").value = "";
  el("su-handle").value = "";
  el("su-email").value = "";
  authMode = "login";
  el("auth-login").style.display = "flex";
  el("auth-signup").style.display = "none";
  el("auth-alt-txt").textContent = "Har du ikke en profil?";
  el("auth-toggle").textContent = "Opret en";
}
sb.auth.onAuthStateChange(function(event){
  if(event === "SIGNED_OUT"){
    resetApp();
    showAuth();
  }
});

/* ================= Init ================= */
setTabIcons("feed");
(async function init(){
  try{
    const { data } = await sb.auth.getSession();
    if(data && data.session) await boot(data.session);
    else showAuth();
  }catch(err){
    console.error(err);
    showAuth(GENERIC_ERR);
  }
})();
</script>
